services:
  app:
    image: ghcr.io/xiaosu7788/xsvo:latest
    ports:
      - "${XSVO_BIND_HOST:-0.0.0.0}:4000:4000"
    volumes:
      - xsvo-main-data:/app/web/.data
    environment:
      NODE_OPTIONS: "--max-old-space-size=384"
      UV_THREADPOOL_SIZE: "2"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      NEXT_PUBLIC_DOC_URL: ${NEXT_PUBLIC_DOC_URL:-}
      XSVO_COOKIE_SECURE: ${XSVO_COOKIE_SECURE:-}
      VOZEB_COOKIE_SECURE: ${VOZEB_COOKIE_SECURE:-}
      XSVO_DATA_DIR: /app/web/.data
      VOZEB_DATA_DIR: /app/web/.data
      XSVO_INTERNAL_ORIGIN: http://127.0.0.1:4000
      VOZEB_INTERNAL_ORIGIN: http://127.0.0.1:4000
    mem_limit: 512m
    memswap_limit: 768m
    restart: unless-stopped

volumes:
  xsvo-main-data:
